services:
  # =========================================
  # Data Source 1: PostgreSQL (Logistics)
  # =========================================
  postgres:
    image: postgres:16
    container_name: datawave-postgres
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datawave-net

  # =========================================
  # Data Source 2: MySQL (Warehouse)
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: datawave-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: warehouse
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - datawave-net

  # =========================================
  # Object Storage: MinIO (S3-compatible)
  # =========================================
  minio:
    image: minio/minio
    container_name: datawave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datawave-net

  # Initialize MinIO buckets
  minio-init:
    image: minio/mc
    container_name: datawave-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/warehouse --ignore-existing;
      mc mb myminio/datalake --ignore-existing;
      exit 0;
      "
    networks:
      - datawave-net

  # =========================================
  # Hive Metastore Backend Database
  # =========================================
  metastore-db:
    image: mysql:8.0
    container_name: datawave-metastore-db
    environment:
      MYSQL_ROOT_PASSWORD: hive
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    volumes:
      - metastore-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-phive"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - datawave-net

  # =========================================
  # Hive Metastore (Catalog for S3/MinIO)
  # =========================================
  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: datawave-hive-metastore
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    volumes:
      - ./hive-metastore/metastore-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/metastore-site.xml:ro
    environment:
      METASTORE_DB_HOSTNAME: metastore-db
    networks:
      - datawave-net

  # =========================================
  # SQL Federation Engine: Trino
  # =========================================
  trino:
    image: trinodb/trino:440
    container_name: datawave-trino
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      hive-metastore:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - datawave-net

  # =========================================
  # Trino Init: Seeds Hive/MinIO data lake
  # Runs once after Trino is healthy, then exits.
  # =========================================
  trino-init:
    image: trinodb/trino:440
    container_name: datawave-trino-init
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./scripts/init-hive-data.sql:/init-hive-data.sql:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting 10s for Trino catalogs to initialize...';
      sleep 10;
      echo 'Seeding Hive/MinIO data lake tables...';
      trino --server http://trino:8080 --execute \"$$(cat /init-hive-data.sql)\";
      echo 'Data lake init complete.';
      "
    networks:
      - datawave-net

  # =========================================
  # BI Tool / Query UI: Metabase
  # =========================================
  metabase:
    image: metabase/metabase:latest
    container_name: datawave-metabase
    depends_on:
      - trino
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    volumes:
      - metabase-data:/metabase-data
    networks:
      - datawave-net

volumes:
  postgres-data:
  mysql-data:
  minio-data:
  metastore-db-data:
  metabase-data:

networks:
  datawave-net:
    driver: bridge
