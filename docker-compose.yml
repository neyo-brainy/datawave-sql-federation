services:
  # =========================================
  # Data Source 1: PostgreSQL (Logistics)
  # =========================================
  postgres:
    image: postgres:16
    container_name: datawave-postgres
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datasources

  # =========================================
  # Data Source 2: MySQL (Warehouse)
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: datawave-mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: warehouse
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmysql"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - datasources

  # =========================================
  # Object Storage: MinIO (S3-compatible)
  # =========================================
  minio:
    image: minio/minio
    container_name: datawave-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datasources

  # Initialize MinIO buckets
  minio-init:
    image: minio/mc
    container_name: datawave-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/warehouse --ignore-existing;
      mc mb myminio/datalake --ignore-existing;
      exit 0;
      "
    networks:
      - datasources

  # =========================================
  # Hive Metastore Backend Database
  # =========================================
  metastore-db:
    image: mysql:8.0
    container_name: datawave-metastore-db
    environment:
      MYSQL_ROOT_PASSWORD: hive
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive
    volumes:
      - metastore-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-phive"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - datasources

  # =========================================
  # Hive Metastore (Catalog for S3/MinIO)
  # =========================================
  hive-metastore:
    image: bitsondatadev/hive-metastore:latest
    container_name: datawave-hive-metastore
    depends_on:
      metastore-db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9083:9083"
    volumes:
      - ./hive-metastore/metastore-site.xml:/opt/apache-hive-metastore-3.0.0-bin/conf/metastore-site.xml:ro
    environment:
      METASTORE_DB_HOSTNAME: metastore-db
    networks:
      - datasources

  # =========================================
  # SQL Federation Engine: Trino
  # =========================================
  trino:
    image: trinodb/trino:440
    container_name: datawave-trino
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      hive-metastore:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino:ro
    healthcheck:
      test: ["CMD", "trino", "--execute", "SELECT 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s
    networks:
      - frontend
      - datasources

  # =========================================
  # Trino Init: Seeds Hive/MinIO data lake
  # Runs once after Trino is healthy, then exits.
  # =========================================
  trino-init:
    image: trinodb/trino:440
    container_name: datawave-trino-init
    depends_on:
      trino:
        condition: service_healthy
    volumes:
      - ./scripts/init-hive-data.sql:/init-hive-data.sql:ro
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting 10s for Trino catalogs to initialize...';
      sleep 10;
      echo 'Seeding Hive/MinIO data lake tables...';
      trino --server http://trino:8080 --execute \"$$(cat /init-hive-data.sql)\";
      echo 'Data lake init complete.';
      "
    networks:
      - frontend

  # =========================================
  # BI Tool / Query UI: Metabase
  # =========================================
  metabase:
    image: metabase/metabase:latest
    container_name: datawave-metabase
    depends_on:
      - trino
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
    volumes:
      - metabase-data:/metabase-data
    networks:
      - frontend

  # =========================================
  # Identity Provider: Keycloak (SSO)
  # =========================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: datawave-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    volumes:
      - ./keycloak/datawave-realm.json:/opt/keycloak/data/import/datawave-realm.json:ro
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - frontend

  # =========================================
  # SSO Proxy: OAuth2 Proxy (protects Trino UI)
  # =========================================
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    container_name: datawave-oauth2-proxy
    depends_on:
      keycloak:
        condition: service_healthy
      trino:
        condition: service_healthy
    environment:
      OAUTH2_PROXY_PROVIDER: keycloak-oidc
      OAUTH2_PROXY_CLIENT_ID: trino-sso
      OAUTH2_PROXY_CLIENT_SECRET: trino-sso-secret
      OAUTH2_PROXY_REDIRECT_URL: http://localhost:4180/oauth2/callback
      OAUTH2_PROXY_OIDC_ISSUER_URL: http://keycloak:8080/realms/datawave
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256
      OAUTH2_PROXY_UPSTREAMS: http://trino:8080
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_COOKIE_SECRET: ZGF0YXdhdmUtY29va2llLXNlY3JldC12YWx1ZS0zMiE=
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"
      OAUTH2_PROXY_SCOPE: openid profile email
      OAUTH2_PROXY_OIDC_AUDIENCE_CLAIMS: aud,azp
    ports:
      - "4180:4180"
    networks:
      - frontend

volumes:
  postgres-data:
  mysql-data:
  minio-data:
  metastore-db-data:
  metabase-data:

networks:
  # Metabase / trino-init → Trino (user-facing layer)
  frontend:
    driver: bridge
  # Trino → PostgreSQL, MySQL, Hive Metastore, MinIO (all data backends)
  datasources:
    driver: bridge
